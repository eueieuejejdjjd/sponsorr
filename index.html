<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赞助支持</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:linear-gradient(145deg,#f5f7fa,#e9edf5);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:"PingFang SC","Microsoft YaHei",sans-serif;padding:20px}
    .card{background:#fff;box-shadow:0 30px 55px rgba(0,0,0,0.08);border-radius:48px;padding:40px 32px;max-width:440px;width:100%;text-align:center}
    .heart{font-size:50px;margin-bottom:20px}
    h1{font-size:2rem;color:#1e293b;margin-bottom:12px}
    .sub{color:#475569;margin-bottom:32px;border-bottom:1px solid #e9eef2;padding-bottom:28px}
    .btn{background:linear-gradient(135deg,#07c160,#05a34f);border:none;color:#fff;font-size:1.35rem;font-weight:600;padding:18px;border-radius:60px;width:100%;cursor:pointer;box-shadow:0 14px 28px rgba(7,193,96,0.3);margin-bottom:14px;display:block;text-decoration:none}
    .btn:active{transform:scale(0.97)}
    .qq-btn{background:linear-gradient(135deg,#12b7f5,#0a8ed9);border:none;color:#fff;font-size:1.2rem;font-weight:600;padding:16px;border-radius:60px;width:100%;cursor:pointer;box-shadow:0 14px 28px rgba(18,183,245,0.3);margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}
    .qq-btn:active{transform:scale(0.97)}
    .badge{color:#576b80;font-size:0.85rem;margin-top:6px}
    .overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;visibility:hidden;opacity:0;transition:.25s}
    .overlay.active{visibility:visible;opacity:1}
    .modal{background:#fff;border-radius:44px;max-width:380px;width:100%;padding:28px 24px;text-align:center;position:relative;margin:20px}
    .close{position:absolute;top:18px;right:22px;background:#f1f5f9;border:none;width:36px;height:36px;border-radius:50%;font-size:22px;cursor:pointer;color:#334155}
    .qr{width:100%;max-width:240px;border-radius:16px;margin:16px auto;display:block}
    .name{font-weight:600;font-size:1.1rem;color:#1e293b;margin:12px 0}
    .note{color:#475569;font-size:0.9rem;background:#f1f5f9;padding:10px;border-radius:24px;margin:16px 0}
    .wxpay{color:#09bb53;font-weight:600;margin-top:8px}
    .thank-text{color:#f97355;font-size:1rem;font-weight:600;margin:12px 0 6px}
  </style>
</head>
<body>
  <div class="card">
    <div class="heart">❤️</div>
    <h1>支持创作者</h1>
    <p class="sub">每一份赞助都是莫大的鼓励<br>感谢你的温暖心意</p>
    
    <!-- 赞助按钮 -->
    <button class="btn" id="sponsorBtn">✨ 赞助点我 ✨</button>
    
    <!-- 加入QQ群按钮 -->
    <a href="https://qun.qq.com/universal-share/share?ac=1&authKey=EeFHLvXeiuF0Y0z8GDcjdzXtgVp5SFwgdY3cUPe%2FHtoXV74eio2CuK7SjG4q1gYK&busi_data=eyJncm91cENvZGUiOiIxMTAxNTA1MDQxIiwidG9rZW4iOiJjcFQ3VjlpNkZTd2ZYT1BxSTBWWGtxNHBtNjBqYVF0aWJBZGxLZFZBZ3JLN2R0UnJYYk92UU1xcUJjeWtQamg1IiwidWluIjoiMzY4Nzk4NjM0NyJ9&data=ZfXP2pcBGdMDsWyWvYEOdfmTXFLNbsWzcebQc1NQ7nwrS9F42EKW06jhneXtVBr9DjuoqzX2kZtea4vARwY7vg&svctype=4&tempid=h5_group_info" class="qq-btn" target="_blank">
      🐧 加入赞助QQ群
    </a>
    
    <div class="badge">请使用微信支付</div>
  </div>

  <!-- 收款码弹窗 -->
  <div class="overlay" id="paymentModal">
    <div class="modal">
      <button class="close" id="closeModal">✕</button>
      <h2 style="margin:8px 0 4px;color:#0f172a">扫码赞赏</h2>
      <p class="thank-text">感谢你的支持！</p>
      <img src="mm_facetoface_collect_qrcode_1764672392278.png" alt="收款码" class="qr">
      <div class="name">6a_z^z(**梅)</div>
      <div class="note">赞助为6元谢谢 喵</div>
      <div class="wxpay">微信支付</div>
    </div>
  </div>

  <script>
    document.getElementById('sponsorBtn').onclick=function(){
      document.getElementById('paymentModal').classList.add('active');
    };
    document.getElementById('closeModal').onclick=function(){
      document.getElementById('paymentModal').classList.remove('active');
    };
    document.getElementById('paymentModal').onclick=function(e){
      if(e.target===this) this.classList.remove('active');
    };
    document.onkeydown=function(e){
      if(e.key==='Escape') document.getElementById('paymentModal').classList.remove('active');
    };
  </script>
</body>
</html>
