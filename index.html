<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>赞助支持 | 微信支付</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #f5f7fa 0%, #e9edf5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      padding: 20px;
      margin: 0;
    }

    .card {
      background: #ffffff;
      box-shadow: 0 30px 55px rgba(0, 0, 0, 0.08), 0 12px 20px rgba(0, 0, 0, 0.05);
      border-radius: 48px;
      padding: 40px 32px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .heart-icon {
      background: #fff5f0;
      color: #f97355;
      width: 70px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 28px;
      font-size: 38px;
      margin: 0 auto 24px;
      box-shadow: 0 18px 30px -10px rgba(249, 115, 85, 0.25);
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 12px;
    }

    .sub-text {
      color: #475569;
      font-size: 1rem;
      margin-bottom: 32px;
      line-height: 1.6;
      border-bottom: 1px solid #e9eef2;
      padding-bottom: 28px;
    }

    .sponsor-btn {
      background: linear-gradient(135deg, #07c160 0%, #05a34f 100%);
      border: none;
      color: white;
      font-size: 1.35rem;
      font-weight: 600;
      padding: 18px 36px;
      border-radius: 60px;
      width: 100%;
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(7, 193, 96, 0.3);
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .sponsor-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 38px rgba(7, 193, 96, 0.4);
    }

    .sponsor-btn:active {
      transform: translateY(2px);
    }

    .wechat-badge {
      font-size: 0.9rem;
      color: #576b80;
      font-weight: 500;
    }

    /* 弹窗 */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.2s, opacity 0.25s ease;
      padding: 20px;
    }

    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .modal-content {
      background: #ffffff;
      border-radius: 44px;
      max-width: 380px;
      width: 100%;
      padding: 28px 24px 32px;
      box-shadow: 0 40px 70px rgba(0, 0, 0, 0.25);
      text-align: center;
      transform: scale(0.92);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }

    .active .modal-content {
      transform: scale(1);
    }

    .close-btn {
      position: absolute;
      top: 18px;
      right: 22px;
      background: #f1f5f9;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 22px;
      cursor: pointer;
      color: #334155;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .close-btn:hover {
      background: #e2e8f0;
    }

    .modal-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: #0f172a;
      margin: 8px 0 16px;
    }

    .qr-container {
      background: #f9fafc;
      border-radius: 32px;
      padding: 20px;
      margin: 16px 0;
      border: 1px solid #edf2f7;
    }

    .qr-image {
      width: 100%;
      max-width: 240px;
      height: auto;
      aspect-ratio: 1 / 1;
      object-fit: contain;
      border-radius: 16px;
      display: block;
      margin: 0 auto;
      background: white;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
    }

    .merchant-name {
      font-weight: 600;
      font-size: 1.1rem;
      color: #1e293b;
      margin: 12px 0 4px;
    }

    .payment-note {
      color: #475569;
      font-size: 0.9rem;
      background: #f1f5f9;
      padding: 10px 16px;
      border-radius: 24px;
      margin: 16px 0 10px;
      font-weight: 500;
    }

    .wechat-pay-logo {
      color: #09bb53;
      font-weight: 600;
      font-size: 1rem;
      margin-top: 8px;
    }

    .tip-text {
      color: #64748b;
      font-size: 0.8rem;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="heart-icon">❤️</div>
    <h1>支持创作者</h1>
    <p class="sub-text">每一份赞助都是莫大的鼓励<br>感谢你的温暖心意</p>

    <button class="sponsor-btn" id="sponsorButton">
      ✨ 赞助支持 ✨
    </button>

    <div class="wechat-badge">推荐使用微信支付</div>
  </div>

  <!-- 收款码弹窗 -->
  <div class="modal-overlay" id="paymentModal">
    <div class="modal-content">
      <button class="close-btn" id="closeModalBtn">✕</button>

      <div class="modal-title">扫码赞助</div>

      <div class="qr-container">
        <!-- ⚠️ 这里换成你的真实收款码图片 -->
        <img src="2183.jpg" alt="微信收款码" class="qr-image">
        <div class="merchant-name">6a_z^z(**梅)</div>
      </div>

      <div class="payment-note">长按识别或扫一扫赞赏</div>
      <div class="wechat-pay-logo">微信支付</div>
      <div class="tip-text">点击右上角或关闭按钮退出</div>
    </div>
  </div>

  <script>
    const sponsorBtn = document.getElementById('sponsorButton');
    const modal = document.getElementById('paymentModal');
    const closeBtn = document.getElementById('closeModalBtn');

    sponsorBtn.addEventListener('click', () => {
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    });

    function closeModal() {
      modal.classList.remove('active');
      document.body.style.overflow = '';
    }

    closeBtn.addEventListener('click', closeModal);

    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });
  </script>
</body>
</html>
